<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COMBOX Admin Delivery</title>
    
    <link rel="manifest" href="admin-manifest.json">
    <meta name="theme-color" content="#ff073a">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <style>
        body { overflow: hidden; margin: 0; padding: 0; background: #e5e3df; font-family: sans-serif; }
        .glass-panel { background: rgba(10, 10, 11, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .leaflet-container { background: #0A0A0B; outline: none; }
    </style>
</head>
<body class="relative w-full h-[100dvh]">

    <div id="map-wrapper" class="absolute inset-0 w-full h-full z-0">
        <div id="map-preview" class="w-full h-full z-0"></div>
    </div>

    <div class="absolute top-0 w-full pointer-events-auto glass-panel px-3 pb-3 flex flex-col gap-2 rounded-b-3xl shadow-2xl shadow-black/50 z-[10000]" style="padding-top: env(safe-area-inset-top);">
        <div class="flex flex-col md:flex-row gap-2 w-full mt-1">
            <div class="flex flex-row gap-2 w-full md:w-[40%] items-center">
                <button onclick="document.getElementById('extra-inputs').classList.toggle('hidden')" class="md:hidden p-2 bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl text-white active:scale-95 transition-all flex-shrink-0">
                    <span class="material-symbols-outlined text-[20px] block">menu</span>
                </button>
                
                <div class="relative flex items-center flex-1">
                    <span class="material-symbols-outlined absolute left-2 text-white text-[16px] pointer-events-none z-10">storefront</span>
                    <select id="cajera-sede" onchange="cambiarSedeAdmin(this.value)" class="w-full bg-white/10 border border-white/20 rounded-xl pl-8 pr-2 py-2.5 text-white text-[11px] md:text-sm focus:outline-none uppercase font-bold appearance-none truncate"></select>
                </div>

                <div class="relative flex items-center flex-1">
                    <span id="coord-icon" class="material-symbols-outlined absolute left-2 text-white text-[16px] pointer-events-none z-10">explore</span>
                    <input type="text" id="cajera-coords" placeholder="Coordenadas" onkeydown="if(event.key === 'Enter') actualizarCoordenadasManualAdmin(this.value)" oninput="actualizarIconoCoordenadas()" class="w-full bg-white/10 border border-white/20 rounded-xl pl-8 pr-10 py-2.5 text-white text-[11px] md:text-sm focus:outline-none focus:border-[#ff073a] focus:ring-1 focus:ring-[#ff073a] truncate transition-all">
                    
                    <button id="btn-coords-action" onclick="accionCoordenadas()" class="absolute right-1 p-1.5 bg-[#ff073a]/20 rounded-lg text-[#ff073a] hover:bg-[#ff073a]/40 active:scale-95 transition-all z-20">
                        <span id="action-icon" class="material-symbols-outlined text-[16px] md:text-[20px] block">edit</span>
                    </button>
                </div>
            </div>

            <div id="extra-inputs" class="hidden md:flex flex-col md:flex-row gap-2 w-full md:w-[60%]">
                <div class="relative flex items-center w-full md:w-1/3">
                    <span class="material-symbols-outlined absolute left-2.5 text-white text-[16px] pointer-events-none">person</span>
                    <input type="text" id="cajera-name" placeholder="Nombre de Cliente" class="w-full bg-white/10 border border-white/20 rounded-xl pl-9 pr-3 py-2.5 text-white text-[11px] md:text-sm focus:outline-none">
                </div>
                <div class="relative flex items-center w-full md:w-1/3">
                    <span class="material-symbols-outlined absolute left-2.5 text-white text-[16px] pointer-events-none">call</span>
                    <input type="tel" id="cajera-phone" placeholder="Teléfono" class="w-full bg-white/10 border border-white/20 rounded-xl pl-9 pr-3 py-2.5 text-white text-[11px] md:text-sm focus:outline-none">
                </div>
                <div class="relative flex items-center w-full md:w-1/3">
                    <span class="material-symbols-outlined absolute left-2.5 text-[#39FF14] text-[16px] pointer-events-none">location_on</span>
                    <input type="text" id="cajera-zona" placeholder="Zona" readonly class="w-full bg-white/10 border border-white/20 rounded-xl pl-9 pr-3 py-2.5 text-[#39FF14] text-[11px] md:text-sm font-bold focus:outline-none cursor-not-allowed text-center truncate">
                </div>
            </div>
        </div>
    </div>

    <div id="admin-pin-controls" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 mt-16 flex gap-3 pointer-events-auto z-[10001]" style="display:none;">
        <button onclick="cancelarPinAdmin()" class="bg-red-600 text-white font-black px-6 py-2 md:py-3 md:px-8 rounded-full shadow-2xl active:scale-95 border border-white/20 uppercase text-[11px] md:text-sm tracking-widest">Cancelar</button>
        <button onclick="aceptarPinAdmin()" class="bg-[#ff073a] text-white font-black px-6 py-2 md:py-3 md:px-8 rounded-full shadow-2xl active:scale-95 border border-white/20 uppercase text-[11px] md:text-sm tracking-widest">Aceptar</button>
    </div>

    <div class="absolute bottom-0 w-full pointer-events-none px-3 pb-[calc(1rem+env(safe-area-inset-bottom))] flex flex-col gap-2 md:gap-4 md:mb-4 z-[10000]">
        <div class="flex gap-2 mx-auto w-full max-w-[340px] md:max-w-2xl">
            <div class="w-1/3 glass-panel rounded-xl py-1.5 md:py-3 text-center shadow-lg">
                <p class="text-[8px] md:text-[10px] uppercase text-gray-400 font-bold tracking-wider">Tiempo</p>
                <span id="cajera-tiempo" class="text-white font-bold text-[11px] md:text-base truncate block px-1">--</span>
            </div>
            <div class="w-1/3 glass-panel rounded-xl py-1.5 md:py-3 text-center shadow-lg">
                <p class="text-[8px] md:text-[10px] uppercase text-gray-400 font-bold tracking-wider">Distancia</p>
                <span id="cajera-km" class="text-white font-bold text-[11px] md:text-base truncate block px-1">--</span>
            </div>
            <div class="w-1/3 glass-panel rounded-xl py-1.5 md:py-3 text-center border-[#39ff14]/30 shadow-lg" style="border-width: 1px;">
                <p class="text-[8px] md:text-[10px] uppercase text-[#39ff14] font-bold tracking-wider">Tarifa</p>
                <span id="cajera-tarifa" class="text-white font-black text-[11px] md:text-base truncate block px-1">--</span>
            </div>
        </div>
        <div class="flex gap-2 pointer-events-auto mx-auto w-full max-w-[340px] md:max-w-2xl">
            <button onclick="alert('Funcionalidad de Traspaso en desarrollo')" class="w-1/2 bg-[#ff073a] py-3 md:py-4 md:text-sm rounded-xl font-black text-white shadow-lg active:scale-95 transition-transform text-[11px] uppercase tracking-wider">Traspasar</button>
            <button onclick="alert('Funcionalidad de Envío en desarrollo')" class="w-1/2 bg-[#39ff14] py-3 md:py-4 md:text-sm rounded-xl font-black text-black shadow-lg active:scale-95 transition-transform text-[11px] uppercase tracking-wider">Enviar</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // ==========================================
        // VARIABLES GLOBALES Y CONFIGURACIÓN INICIAL
        // ==========================================
        let map = null;
        let userMarker = null;
        let rutaLayer = null;
        let marcadoresSedesMap = [];
        let checkoutSede = null;
        let isAdminDelivery = true; 
        let adminPendingLatLng = null;
        let isEditingLocation = false;
        let isManualLocation = true;
        let tarifaFinalCalculada = 0;

        // Base de Datos Simulada (Reemplazar luego con fetch a tu Google Sheet)
        let db = {
            sedes: [
                { ID_SEDE: "1", NOMBRE_SEDE: "Naguanagua", COORDENADAS_SEDE: "10.2543,-68.0101", TARIFA_MINIMA: "1.5", TARIFA_POR_KM: "1" },
                { ID_SEDE: "2", NOMBRE_SEDE: "Valencia, Av. Bolívar Norte", COORDENADAS_SEDE: "10.2200,-68.0000", TARIFA_MINIMA: "1.5", TARIFA_POR_KM: "1" }
            ]
        };

        // Íconos SVG Personalizados para el Mapa
        const redPinIcon = L.divIcon({ html: '<div style="width:24px;height:24px;background:#ef4444;border-radius:50%;border:3px solid white;box-shadow: 0 0 15px rgba(239,68,68,0.9);"></div>', className: 'bg-transparent', iconSize: [24, 24], iconAnchor: [12, 12] });
        const greenDotIcon = L.divIcon({ html: '<div style="width:24px;height:24px;background:#39FF14;border-radius:50%;border:3px solid white;box-shadow: 0 0 15px rgba(57,255,20,0.9);"></div>', className: 'bg-transparent', iconSize: [24, 24], iconAnchor: [12, 12] });

        // ==========================================
        // INICIALIZACIÓN DEL MAPA
        // ==========================================
        function initLeafletMap() {
            if (map) return;
            const customRenderer = L.svg({ padding: 2.5 });
            map = L.map('map-preview', { zoomControl: false, renderer: customRenderer }).setView([10.2543, -68.0101], 13);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CARTO'
            }).addTo(map);

            checkoutSede = db.sedes[0];
            dibujarSedesEnMapa();
            
            const selectSedeAdmin = document.getElementById('cajera-sede');
            if (selectSedeAdmin) {
                selectSedeAdmin.innerHTML = db.sedes.map(s => `<option value="${s.ID_SEDE}" style="background-color: #1A1A1A; color: #FFFFFF;">${s.NOMBRE_SEDE.split(',')[0]}</option>`).join('');
                selectSedeAdmin.value = checkoutSede.ID_SEDE;
            }
        }

        // ==========================================
        // FUNCIONES ADMIN Y UI
        // ==========================================
        function dibujarSedesEnMapa() {
            if (!map || !db || !db.sedes) return;
            marcadoresSedesMap.forEach(m => map.removeLayer(m));
            marcadoresSedesMap = [];

            db.sedes.forEach(s => {
                const [sLat, sLng] = s.COORDENADAS_SEDE.split(',').map(Number);
                const isSelected = checkoutSede && (String(s.ID_SEDE) === String(checkoutSede.ID_SEDE));
                
                const iconHtml = `
                    <div class="sede-marker-content flex flex-col items-center justify-center cursor-pointer relative z-[400]" onclick="event.stopPropagation(); cambiarSedeAdmin('${s.ID_SEDE}')">
                        <div class="w-10 h-10 rounded-full border-2 border-red-500 shadow-[0_0_15px_rgba(239,68,68,0.9)] bg-black/60 flex items-center justify-center mb-1 ${isSelected ? '' : 'scale-[0.85] brightness-75'}">
                            <span class="material-symbols-outlined text-white" style="font-size: 22px;">storefront</span>
                        </div>
                        <div class="bg-black/40 backdrop-blur-md border border-white/10 px-2 py-1.5 rounded-xl flex flex-col items-center shadow-lg ${isSelected ? '' : 'opacity-80 scale-[0.95]'}">
                            <span class="text-[7.5px] font-bold text-zinc-300 uppercase leading-none mt-1 text-center">${s.NOMBRE_SEDE.split(',')[0]}</span>
                        </div>
                    </div>`;
                    
                const icon = L.divIcon({ html: iconHtml, className: 'bg-transparent', iconSize: [90, 90], iconAnchor:[45, 45] });
                marcadoresSedesMap.push(L.marker([sLat, sLng], { icon }).addTo(map));
            });
        }

        function cambiarSedeAdmin(id) {
            checkoutSede = db.sedes.find(s => String(s.ID_SEDE) === String(id)) || checkoutSede;
            document.getElementById('cajera-sede').value = checkoutSede.ID_SEDE;
            dibujarSedesEnMapa();

            const coords = document.getElementById('cajera-coords').value;
            if(coords) {
                const [lat, lng] = coords.split(',').map(Number);
                renderMapPosition(lat, lng, true); 
            } else {
                const [sLat, sLng] = checkoutSede.COORDENADAS_SEDE.split(',').map(Number);
                map.setView([sLat, sLng], 13);
            }
        }

        // ==========================================
        // CÁLCULO DE RUTAS Y PINES
        // ==========================================
        async function renderMapPosition(lat, lng) {
            if(!checkoutSede) return;
            const [sedeLat, sedeLng] = checkoutSede.COORDENADAS_SEDE.split(',').map(Number);
            
            if (userMarker) {
                userMarker.setLatLng([lat, lng]);
                userMarker.setIcon(redPinIcon);
            } else {
                userMarker = L.marker([lat, lng], { icon: redPinIcon }).addTo(map);
            }

            document.getElementById('cajera-tarifa').innerText = "Calculando...";
            
            // Usamos OSRM público como ruteo básico para pruebas
            const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${sedeLng},${sedeLat};${lng},${lat}?overview=full&geometries=geojson`;
            
            try {
                const res = await fetch(osrmUrl);
                const data = await res.json();
                
                if (data.code === 'Ok' && data.routes.length > 0) {
                    const route = data.routes[0];
                    const distanceKm = route.distance / 1000;
                    const durationMin = Math.ceil(route.duration / 60);

                    const min = parseFloat(checkoutSede.TARIFA_MINIMA) || 1.5; 
                    let rawPrice = distanceKm * (parseFloat(checkoutSede.TARIFA_POR_KM) || 1);
                    tarifaFinalCalculada = Math.max(min, Math.floor(rawPrice) + ((rawPrice % 1) >= 0.6 ? 1 : 0));

                    document.getElementById('cajera-tarifa').innerText = `$${tarifaFinalCalculada.toFixed(2)}`;
                    document.getElementById('cajera-km').innerText = `${distanceKm.toFixed(1)} km`;
                    document.getElementById('cajera-tiempo').innerText = `${durationMin} min`;

                    if (rutaLayer) map.removeLayer(rutaLayer);
                    rutaLayer = L.geoJSON(route.geometry, { style: { color: '#39FF14', weight: 4, opacity: 0.8, dashArray: '8, 8' } }).addTo(map);
                    
                    map.fitBounds(rutaLayer.getBounds(), { padding: [40, 40] });
                }
            } catch(e) {
                document.getElementById('cajera-tarifa').innerText = "Error";
            }
        }

        function activarPinAdmin() {
            if(!map) return;
            isEditingLocation = true;
            document.getElementById('admin-pin-controls').style.display = 'flex';
            if (rutaLayer) { map.removeLayer(rutaLayer); rutaLayer = null; }
            
            const center = map.getCenter();
            if (userMarker) { userMarker.setIcon(redPinIcon); userMarker.setLatLng(center); } 
            else { userMarker = L.marker(center, {icon: redPinIcon}).addTo(map); }
            
            adminPendingLatLng = center;
            window.adminMapMoveEvent = () => { if(isEditingLocation && userMarker) userMarker.setLatLng(map.getCenter()); };
            window.adminMapMoveEndEvent = () => { if(isEditingLocation) adminPendingLatLng = map.getCenter(); };
            
            map.on('move', window.adminMapMoveEvent);
            map.on('moveend', window.adminMapMoveEndEvent);
        }

        async function aceptarPinAdmin(manualLat = null, manualLng = null) {
            isEditingLocation = false;
            document.getElementById('admin-pin-controls').style.display = 'none';
            map.off('move', window.adminMapMoveEvent);
            map.off('moveend', window.adminMapMoveEndEvent);
            
            const lat = manualLat || (adminPendingLatLng ? adminPendingLatLng.lat : null);
            const lng = manualLng || (adminPendingLatLng ? adminPendingLatLng.lng : null);
            if(!lat || !lng) return;
            
            document.getElementById('cajera-coords').value = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
            actualizarIconoCoordenadas();
            await renderMapPosition(lat, lng);
            await obtenerZonaORS(lat, lng);
        }

        function cancelarPinAdmin() {
            isEditingLocation = false;
            document.getElementById('admin-pin-controls').style.display = 'none';
            map.off('move', window.adminMapMoveEvent);
            map.off('moveend', window.adminMapMoveEndEvent);
            
            const coords = document.getElementById('cajera-coords').value;
            if(coords) {
                const [lat, lng] = coords.split(',').map(Number);
                renderMapPosition(lat, lng);
            } else {
                if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
                if (rutaLayer) { map.removeLayer(rutaLayer); rutaLayer = null; }
            }
        }

        async function obtenerZonaORS(lat, lng) {
            const inputZona = document.getElementById('cajera-zona');
            inputZona.value = "Buscando...";
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);
                const data = await res.json();
                if (data && data.address) {
                    let partes = [];
                    if (data.address.road) partes.push(data.address.road);
                    else if (data.address.neighbourhood) partes.push(data.address.neighbourhood);
                    if (data.address.city || data.address.town) partes.push(data.address.city || data.address.town);
                    if (partes.length > 0) { inputZona.value = partes.join(', '); return; }
                }
            } catch(e) {}
            inputZona.value = "Ubicación fijada";
        }

        // ==========================================
        // MANEJO DE INPUTS Y EVENTOS
        // ==========================================
        function actualizarIconoCoordenadas() {
            const input = document.getElementById('cajera-coords');
            const icon = document.getElementById('action-icon');
            const btn = document.getElementById('btn-coords-action');
            if (input.value.trim().length > 0) {
                icon.innerText = 'close';
                btn.classList.replace('bg-[#ff073a]/20', 'bg-red-500/20');
                btn.classList.replace('text-[#ff073a]', 'text-red-500');
            } else {
                icon.innerText = 'edit';
                btn.classList.replace('bg-red-500/20', 'bg-[#ff073a]/20');
                btn.classList.replace('text-red-500', 'text-[#ff073a]');
            }
        }

        function accionCoordenadas() {
            const icon = document.getElementById('action-icon');
            if (icon.innerText === 'close') {
                document.getElementById('cajera-coords').value = '';
                document.getElementById('cajera-zona').value = '';
                document.getElementById('cajera-tarifa').innerText = '--';
                document.getElementById('cajera-km').innerText = '--';
                document.getElementById('cajera-tiempo').innerText = '--';
                actualizarIconoCoordenadas();
                if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
                if (rutaLayer) { map.removeLayer(rutaLayer); rutaLayer = null; }
                const [sLat, sLng] = checkoutSede.COORDENADAS_SEDE.split(',').map(Number);
                map.setView([sLat, sLng], 13);
            } else {
                activarPinAdmin();
            }
        }

        async function actualizarCoordenadasManualAdmin(val) {
            if(!val || val.trim() === '') return; 
            const match = val.match(/[(]?\s*(-?\d+\.\d+)\s*[,;\s]+\s*(-?\d+\.\d+)\s*[)]?/);
            if(match) {
                document.getElementById('cajera-coords').blur(); 
                await aceptarPinAdmin(parseFloat(match[1]), parseFloat(match[2])); 
            } else {
                alert("Formato inválido. Usa: Latitud, Longitud (ej: 10.254, -68.010)");
            }
        }

        // Arrancar el mapa cuando el DOM esté listo
        document.addEventListener("DOMContentLoaded", () => {
            initLeafletMap();
        });
    </script>
</body>
</html>
